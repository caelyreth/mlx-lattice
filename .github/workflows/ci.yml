name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: 1
  UV_LINK_MODE: copy
  LLVM_VERSION: "20.1.8"

jobs:
  quality:
    name: Python ${{ matrix.python-version }} Quick Check
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Ty
        run: uv run --no-sync ty check

      - name: Test for CPU backend
        run: uv run --no-sync pytest --backend cpu

      - name: Test for Metal backend
        run: uv run --no-sync pytest --backend metal

  contract-quality:
    name: Contract Python ${{ matrix.python-version }} Linux Check
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install contract dependencies
        run: uv sync --project contract --group dev

      - name: Ruff
        run: uv run --project contract --no-sync ruff check contract

      - name: Ty
        run: uv run --project contract --no-sync ty check contract/lattice_contract

      - name: Test contract package
        run: uv run --project contract --no-sync pytest contract/tests

  package-build:
    name: Build workspace distributions
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up LLVM/MLIR
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}
          cached: true

      - name: Build workspace distributions
        run: |
          uv build --project contract
          uv build --project benchmarks
          uv build \
            --config-setting=cmake.define.MLX_LATTICE_ENABLE_MLIR=ON
        env:
          CMAKE_PREFIX_PATH: ${{ env.LLVM_PATH }}
          LLVM_DIR: ${{ env.LLVM_PATH }}/lib/cmake/llvm
          MLIR_DIR: ${{ env.LLVM_PATH }}/lib/cmake/mlir

      - name: Smoke test MLIR-enabled wheel
        run: |
          python -m venv .wheel-smoke
          .wheel-smoke/bin/python -m pip install ./contract dist/mlx_lattice-*.whl
          .wheel-smoke/bin/python - <<'PY'
          import mlx_lattice as lattice
          from mlx_lattice.artifact import native_artifact_execution_available

          capabilities = lattice.backend_info()["capabilities"]
          assert capabilities["mlir"] is True
          assert native_artifact_execution_available() is True
          PY

      - name: Check wheel does not depend on external MLIR dylibs
        run: |
          wheel="$(ls dist/mlx_lattice-*.whl)"
          python -m zipfile -e "$wheel" .wheel-linkage
          extension="$(find .wheel-linkage -name '*.so' -o -name '*.dylib')"
          otool -L "$extension"
          ! otool -L "$extension" | grep -E '/(LLVM|MLIR)|lib(LLVM|MLIR).*\.dylib'
