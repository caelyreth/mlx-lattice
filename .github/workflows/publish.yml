name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy
  LLVM_VERSION: "20.1.8"
  EXPECTED_CONTRACT_DISTRIBUTIONS: "2"
  EXPECTED_MLX_DISTRIBUTIONS: "4"

jobs:
  build-contract:
    name: Contract distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches contract version
        run: test "${GITHUB_REF_NAME#v}" = "$(uv version --project contract --short)"

      - name: Build contract distributions
        run: uv build --project contract --out-dir dist/contract --no-create-gitignore

      - name: Smoke test contract wheel
        run: |
          export EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          python -m venv .contract-smoke
          .contract-smoke/bin/python -m pip install dist/contract/*.whl
          .contract-smoke/bin/python - <<'PY'
          import os

          import lattice_contract as contract

          assert contract.__version__ == os.environ["EXPECTED_VERSION"]
          assert contract.ARTIFACT_GRAPH_FILE == "graph.mlir"
          assert contract.ARTIFACT_WEIGHT_FILE == "weights.safetensors"
          assert contract.LATTICE_DIALECT.namespace == "lattice"
          PY

      - name: Upload contract distributions
        uses: actions/upload-artifact@v7
        with:
          name: lattice-contract
          path: dist/contract/*
          if-no-files-found: error
          compression-level: 0

  publish-contract:
    name: Publish contract to PyPI
    runs-on: ubuntu-latest
    needs: build-contract
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21

      - name: Download contract distributions
        uses: actions/download-artifact@v8
        with:
          name: lattice-contract
          path: artifacts/lattice-contract

      - name: Prepare contract distributions
        run: |
          bash .github/scripts/prepare-distributions.sh \
            artifacts/lattice-contract \
            dist/contract \
            "$EXPECTED_CONTRACT_DISTRIBUTIONS"

      - name: Check contract distribution archives
        run: |
          for wheel in dist/contract/*.whl; do
            unzip -t "$wheel"
          done

          for sdist in dist/contract/*.tar.gz; do
            tar -tzf "$sdist" >/dev/null
          done

      - name: Check contract distribution metadata
        run: uvx twine check dist/contract/*

      - name: Publish contract distributions
        run: |
          uv publish \
            --trusted-publishing always \
            --check-url https://pypi.org/simple/lattice-contract/ \
            dist/contract/*

  build-wheels:
    name: Wheel (macos-26, Python ${{ matrix.python-version }})
    runs-on: macos-26
    needs: publish-contract

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up LLVM/MLIR
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}
          cached: true

      - name: Check tag matches project version
        run: test "${GITHUB_REF_NAME#v}" = "$(uv version --short)"

      - name: Build wheel
        run: |
          uv build \
            --wheel \
            --python "${{ matrix.python-version }}" \
            --out-dir dist \
            --config-setting=cmake.define.MLX_LATTICE_ENABLE_MLIR=ON
        env:
          CMAKE_PREFIX_PATH: ${{ env.LLVM_PATH }}
          LLVM_DIR: ${{ env.LLVM_PATH }}/lib/cmake/llvm
          MACOSX_DEPLOYMENT_TARGET: "26.0"
          MLIR_DIR: ${{ env.LLVM_PATH }}/lib/cmake/mlir

      - name: Smoke test wheel
        run: |
          export EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          python -m venv .wheel-smoke
          .wheel-smoke/bin/python -m pip install ./contract dist/*.whl
          .wheel-smoke/bin/python - <<'PY'
          import os

          import mlx_lattice as lattice
          from mlx_lattice.artifact import native_artifact_execution_available

          info = lattice.backend_info()
          capabilities = info["capabilities"]

          assert lattice.__version__ == os.environ["EXPECTED_VERSION"]
          assert info["version"] == lattice.__version__
          assert set(capabilities) == {"cpu", "metal", "mlir"}
          assert all(isinstance(value, bool) for value in capabilities.values())
          assert capabilities["mlir"] is True
          assert native_artifact_execution_available() is True
          PY

      - name: Check wheel does not depend on external MLIR dylibs
        run: |
          wheel="$(ls dist/*.whl)"
          python -m zipfile -e "$wheel" .wheel-linkage
          extension="$(find .wheel-linkage -name '*.so' -o -name '*.dylib')"
          otool -L "$extension"
          ! otool -L "$extension" | grep -E '/(LLVM|MLIR)|lib(LLVM|MLIR).*\.dylib'

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-macos-26-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    needs: publish-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: test "${GITHUB_REF_NAME#v}" = "$(uv version --short)"

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          compression-level: 0

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Remove contract distributions
        run: rm -rf artifacts/lattice-contract

      - name: Prepare distributions
        run: bash .github/scripts/prepare-distributions.sh artifacts dist "$EXPECTED_MLX_DISTRIBUTIONS"

      - name: Check distribution archives
        run: |
          for wheel in dist/*.whl; do
            unzip -t "$wheel"
          done

          for sdist in dist/*.tar.gz; do
            tar -tzf "$sdist" >/dev/null
          done

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish distributions
        run: |
          uv publish \
            --trusted-publishing always \
            --check-url https://pypi.org/simple/mlx-lattice/ \
            dist/*

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [publish-contract, publish]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare distributions
        run: |
          expected="$((EXPECTED_CONTRACT_DISTRIBUTIONS + EXPECTED_MLX_DISTRIBUTIONS))"
          bash .github/scripts/prepare-distributions.sh artifacts dist "$expected"

      - name: Create release notes
        run: npx --yes changelogithub@14 --contributors --emoji false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach distributions
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
