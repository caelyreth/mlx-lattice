name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy

jobs:
  mac-quality:
    name: macOS quality (Python ${{ matrix.python-version }})
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up macOS environment
        uses: ./.github/actions/setup-macos
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Ty
        run: uv run --no-sync ty check

      - name: Test
        run: uv run --no-sync pytest

  cuda-quality:
    name: Linux CUDA quality (Python 3.12)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Linux CUDA environment
        uses: ./.github/actions/setup-linux
        with:
          toolkit: cuda-13.0
          python-version: "3.12"
          ccache-key: mlx-lattice-cuda-quality

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check CUDA compiler
        run: |
          nvcc --version
          echo "CUDA_PATH=${CUDA_PATH}"
          test -f "${CUDA_PATH}/targets/x86_64-linux/include/cublasLt.h"

      - name: Build project
        run: |
          uv sync \
            --group dev \
            --reinstall-package mlx-lattice \
            -Ccmake.define.CMAKE_CUDA_ARCHITECTURES=80 \
            -Ccmake.define.MLX_LATTICE_REQUIRE_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_METAL=OFF

      - name: Configure runtime linker paths
        run: |
          mlx_package_dir="$(
            uv run --no-sync python -c "import importlib.util, pathlib, sys; spec = importlib.util.find_spec('mlx'); roots = list(spec.submodule_search_locations or []) if spec else []; print(pathlib.Path(roots[0]) if roots else ''); sys.exit(0 if roots else 1)"
          )"

          {
            echo "MLX_PACKAGE_DIR=${mlx_package_dir}"
            echo "LD_LIBRARY_PATH=${mlx_package_dir}/lib:${LD_LIBRARY_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Check built backend flags
        run: |
          uv run --no-sync python - <<'PY'
          import mlx_lattice as lattice

          capabilities = lattice.capabilities()
          print("MLX Lattice capabilities:", capabilities)

          if not capabilities.get("cuda"):
              raise SystemExit("mlx-lattice was not built with CUDA support")
          PY

      - name: Test
        run: uv run --no-sync pytest
